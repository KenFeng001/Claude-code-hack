<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" vid="3">
    <title vid="4">GymSurf Profile</title>
    <style vid="5">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-white: #FFFFFF;
            --bg-gray: #EBEAE5;
            --bg-light: #FAFAFA;
            --accent-coral: #F06A4D;
            --accent-yellow: #F5BA55;
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --border-color: #E0E0E0;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --pad-main: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            background-color: #D1D1D1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        #app-container {
            width: 393px;
            height: 852px;
            background-color: var(--bg-white);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 40px;
            border: 8px solid #000;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }

        .header {
            padding: 40px var(--pad-main) 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            z-index: 10;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.5px;
        }

        .content {
            flex-grow: 1;
            padding: 0 var(--pad-main);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: 120px;
        }

        .label-small {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 400;
        }

        .huge-title {
            font-size: 48px;
            font-weight: 300;
            line-height: 1.1;
            letter-spacing: -0.04em;
            margin-bottom: 8px;
            color: var(--text-main);
        }

        .visual-circle-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 6px;
            margin-bottom: 32px;
            width: 100%;
        }

        .grid-circle {
            aspect-ratio: 1;
            border-radius: 50%;
            background-color: var(--bg-light);
        }

        .grid-circle.coral { background-color: var(--accent-coral); }
        .grid-circle.yellow { background-color: var(--accent-yellow); }

        .stats-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--bg-light);
            border-radius: 20px;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: -0.02em;
            margin-bottom: 4px;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .map-preview {
            width: 100%;
            height: 180px;
            background-color: var(--bg-gray);
            border-radius: 24px;
            margin-bottom: 32px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .map-dot {
            position: absolute;
            width: 10px;
            height: 10px;
            background: var(--accent-coral);
            border: 2px solid white;
            border-radius: 50%;
        }

        .buddy-row {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 8px;
        }

        .buddy-stack {
            display: flex;
            margin-right: 8px;
        }

        .buddy-mini {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid white;
            margin-left: -12px;
            background: #ddd;
            overflow: hidden;
        }

        .buddy-mini:first-child { margin-left: 0; }
        
        .buddy-mini img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px var(--pad-main) 40px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: 1px solid var(--border-color);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
        }

        .nav-item.active {
            color: var(--accent-coral);
        }

        .nav-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

    </style>
</head>
