<html lang="en" vid="0"><head vid="1">
    <meta charset="UTF-8" vid="2">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" vid="3">
    <title vid="4">GymSurf - Active Session</title>
    <style vid="5">
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        :root {
            --bg-white: #FFFFFF;
            --bg-gray: #EBEAE5;
            --bg-light: #FAFAFA;
            --accent-coral: #F06A4D;
            --accent-yellow: #F5BA55;
            --text-main: #1A1A1A;
            --text-muted: #666666;
            --border-color: #E0E0E0;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            --pad-main: 24px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: var(--font-family);
            background-color: #D1D1D1;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        #app-container {
            width: 393px;
            height: 852px;
            background-color: var(--bg-white);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border-radius: 40px;
            border: 8px solid #000;
            box-shadow: 0 0 50px rgba(0,0,0,0.1);
        }

        .header {
            padding: 40px var(--pad-main) 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }

        .logo {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background-color: var(--bg-light);
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 600;
            font-size: 16px;
            letter-spacing: -0.5px;
        }

        .status-pill {
            background: var(--bg-light);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            color: var(--accent-coral);
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pulse-dot {
            width: 6px;
            height: 6px;
            background: var(--accent-coral);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        .content {
            flex-grow: 1;
            padding: 0 var(--pad-main);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            padding-bottom: 120px;
        }

        .timer-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px 0;
            position: relative;
        }

        .progress-ring-svg {
            transform: rotate(-90deg);
            width: 220px;
            height: 220px;
        }

        .progress-ring-circle-bg {
            fill: transparent;
            stroke: var(--bg-light);
            stroke-width: 8;
        }

        .progress-ring-circle {
            fill: transparent;
            stroke: var(--accent-coral);
            stroke-width: 8;
            stroke-linecap: round;
            stroke-dasharray: 628; 
            stroke-dashoffset: 180;
            transition: stroke-dashoffset 0.3s;
        }

        .timer-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .timer-val {
            font-size: 48px;
            font-weight: 300;
            letter-spacing: -2px;
            line-height: 1;
        }

        .timer-label {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 4px;
        }

        .workout-title {
            font-size: 32px;
            font-weight: 300;
            letter-spacing: -0.04em;
            margin-bottom: 24px;
        }

        .exercise-card {
            background: var(--bg-light);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.2s ease;
        }

        .exercise-card.active {
            border: 1px solid var(--accent-coral);
            background: #FFF;
        }

        .exercise-card.done {
            opacity: 0.5;
        }

        .ex-info h4 {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .ex-info p {
            font-size: 14px;
            color: var(--text-muted);
        }

        .ex-sets {
            display: flex;
            gap: 4px;
        }

        .set-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: var(--border-color);
        }

        .set-dot.active {
            background: var(--accent-coral);
        }

        .set-dot.completed {
            background: var(--text-main);
        }

        .bottom-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 20px var(--pad-main) 40px;
            background: linear-gradient(to top, var(--bg-white) 80%, transparent);
            display: flex;
            gap: 12px;
        }

        .btn-pause {
            flex: 1;
            height: 60px;
            border-radius: 16px;
            border: 1px solid var(--border-color);
            background: white;
            font-size: 16px;
            font-weight: 500;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-finish {
            flex: 2;
            height: 60px;
            border-radius: 16px;
            background: var(--accent-coral);
            color: white;
            border: none;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .badge-list {
            display: flex;
            gap: 8px;
            margin-bottom: 24px;
        }

        .mini-badge {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            background: var(--accent-yellow);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }
    </style>
</head>
